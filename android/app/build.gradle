plugins {
    id "com.android.application"
}

android {
    namespace "com.bespoke.realops"
    compileSdk 35

    defaultConfig {
        applicationId "com.bespoke.realops"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            debuggable false
            minifyEnabled false
        }
        demo {
            initWith release
            debuggable false
            minifyEnabled false
            signingConfig signingConfigs.debug
            matchingFallbacks = ["release"]
        }
    }

}

androidComponents {
    onVariants(selector().withBuildType("demo")) { variant ->
        variant.outputs.forEach { output ->
            output.outputFileName.set("BespokeOps-demo-release.apk")
        }
    }
}
